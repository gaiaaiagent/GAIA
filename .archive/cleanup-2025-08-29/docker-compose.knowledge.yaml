version: '3.8'

services:
  # Override the regen service to add knowledge mount
  regen:
    image: ghcr.io/gaiaaiagent/gaia/regen:regen-latest
    container_name: regenai
    command: sh -c "cd packages/cli && bun dist/index.js start --character /app/characters/regenai.character.json --character /app/characters/advocate.character.json --character /app/characters/governor.character.json --character /app/characters/narrative.character.json --character /app/characters/voiceofnature.character.json"
    volumes:
      - ./characters:/app/characters:ro
      - ./.env:/app/.env:ro
      - ./knowledge:/app/knowledge:ro  # Add knowledge mount
    environment:
      - NODE_ENV=development
      - ELIZA_UI_ENABLE=true
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SERVER_PORT=3000
      - SERVER_HOST=0.0.0.0
      - POSTGRES_URL=postgresql://postgres:postgres@postgres:5432/eliza
      # Enable knowledge features
      - LOAD_DOCS_ON_STARTUP=true
      - KNOWLEDGE_PATH=/app/knowledge
      - CTX_KNOWLEDGE_ENABLED=true
    ports:
      - '3000:3000'
      - '50000-50100:50000-50100/udp'
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    networks:
      - eliza-network