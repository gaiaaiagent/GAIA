events {
    worker_connections 1024;
}

http {
    # MIME types
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Upstream servers
    upstream regen_app {
        server regenai:3000;
    }

    upstream django_app {
        server django-admin:8000;
    }

    # HTTP to HTTPS redirect for all domains
    server {
        listen 80;
        server_name _;
        
        # Allow Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        
        # Redirect all other HTTP traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS configuration for agents subdomain
    server {
        listen 443 ssl http2;
        server_name agents.regen.gaiaai.xyz;

        # SSL certificates (will be generated by certbot)
        ssl_certificate /etc/letsencrypt/live/regen.gaiaai.xyz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/regen.gaiaai.xyz/privkey.pem;
        
        # SSL configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_stapling on;
        ssl_stapling_verify on;

        location / {
            # Basic Authentication
            auth_basic "RegenAI Agents - Team Access Only";
            auth_basic_user_file /etc/nginx/auth/.htpasswd;
            
            # Proxy to RegenAI agents
            proxy_pass http://regen_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Ssl on;
            
            # Timeouts for long-running connections
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }

    # HTTPS configuration for admin and dashboard subdomains
    server {
        listen 443 ssl http2;
        server_name admin.regen.gaiaai.xyz dashboard.regen.gaiaai.xyz;

        # SSL certificates
        ssl_certificate /etc/letsencrypt/live/regen.gaiaai.xyz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/regen.gaiaai.xyz/privkey.pem;
        
        # SSL configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_stapling on;
        ssl_stapling_verify on;

        # Django static files
        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location /media/ {
            alias /app/media/;
            expires 30d;
        }

        location / {
            proxy_pass http://django_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Ssl on;
            
            # Django CSRF protection
            proxy_set_header X-CSRFToken $http_x_csrftoken;
        }
    }

    # HTTPS configuration for main domain
    server {
        listen 443 ssl http2;
        server_name regen.gaiaai.xyz www.regen.gaiaai.xyz;

        # SSL certificates
        ssl_certificate /etc/letsencrypt/live/regen.gaiaai.xyz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/regen.gaiaai.xyz/privkey.pem;
        
        # SSL configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_stapling on;
        ssl_stapling_verify on;

        # Redirect to agents subdomain
        location / {
            return 301 https://agents.regen.gaiaai.xyz/;
        }
    }
}