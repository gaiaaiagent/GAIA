<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGEN IRL Grant Applications - Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filters select, .filters input, .filters button {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        .filters button {
            background: #667eea;
            color: white;
            cursor: pointer;
            padding: 10px 20px;
        }

        .filters button:hover {
            background: #5a67d8;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            background: #f7fafc;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #4a5568;
            border-bottom: 2px solid #e2e8f0;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
        }

        tr:hover {
            background: #f7fafc;
        }

        .status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .status.pending {
            background: #fef3c7;
            color: #92400e;
        }

        .status.reviewed {
            background: #dbeafe;
            color: #1e40af;
        }

        .status.approved {
            background: #d1fae5;
            color: #065f46;
        }

        .status.rejected {
            background: #fee2e2;
            color: #991b1b;
        }

        .view-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .view-btn:hover {
            background: #5a67d8;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            overflow: auto;
        }

        .modal-content {
            background-color: white;
            margin: 50px auto;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .close:hover {
            color: #333;
        }

        .field {
            margin-bottom: 20px;
        }

        .field-label {
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 5px;
        }

        .field-value {
            padding: 10px;
            background: #f7fafc;
            border-radius: 6px;
            white-space: pre-wrap;
        }

        .actions {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 10px;
        }

        .actions button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .approve-btn {
            background: #10b981;
            color: white;
        }

        .reject-btn {
            background: #ef4444;
            color: white;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #718096;
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .export-btn {
            background: #10b981;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            float: right;
            margin-bottom: 20px;
        }

        .export-btn:hover {
            background: #059669;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>REGEN IRL Grant Applications Admin</h1>
        <p style="color: #718096; margin-bottom: 20px;">Review and manage grant applications</p>

        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="stat-value">-</div>
                <div class="stat-label">Total Applications</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">-</div>
                <div class="stat-label">Pending Review</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">-</div>
                <div class="stat-label">Average Confidence</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">-</div>
                <div class="stat-label">Average Importance</div>
            </div>
        </div>

        <button class="export-btn" onclick="exportToCSV()">Export to CSV</button>

        <div class="filters">
            <select id="statusFilter">
                <option value="">All Status</option>
                <option value="pending">Pending</option>
                <option value="reviewed">Reviewed</option>
                <option value="approved">Approved</option>
                <option value="rejected">Rejected</option>
            </select>
            <select id="categoryFilter">
                <option value="">All Categories</option>
                <option value="carbon-sequestration">Carbon Sequestration</option>
                <option value="biodiversity">Biodiversity</option>
                <option value="regenerative-agriculture">Regenerative Agriculture</option>
                <option value="water-conservation">Water Conservation</option>
                <option value="soil-health">Soil Health</option>
                <option value="renewable-energy">Renewable Energy</option>
                <option value="waste-reduction">Waste Reduction</option>
                <option value="other">Other</option>
            </select>
            <button onclick="loadApplications()">Apply Filters</button>
            <button onclick="resetFilters()">Reset</button>
        </div>

        <div id="loading" class="loading">Loading applications...</div>
        <div id="error" class="error" style="display: none;"></div>

        <table id="applicationsTable" style="display: none;">
            <thead>
                <tr>
                    <th>Submitted</th>
                    <th>Project Title</th>
                    <th>Category</th>
                    <th>Email</th>
                    <th>Confidence</th>
                    <th>Importance</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="applicationsBody">
            </tbody>
        </table>
    </div>

    <!-- Application Detail Modal -->
    <div id="detailModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle">Application Details</h2>
            <div id="modalContent"></div>
        </div>
    </div>

    <script>
        let applications = [];

        // Load applications on page load
        window.addEventListener('DOMContentLoaded', () => {
            loadStats();
            loadApplications();
        });

        async function loadStats() {
            try {
                const response = await fetch('/api/grants/stats');
                const stats = await response.json();
                
                document.querySelector('.stats').innerHTML = `
                    <div class="stat-card">
                        <div class="stat-value">${stats.total_applications || 0}</div>
                        <div class="stat-label">Total Applications</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${stats.pending_count || 0}</div>
                        <div class="stat-label">Pending Review</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${stats.avg_confidence || 0}</div>
                        <div class="stat-label">Average Confidence</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${stats.avg_importance || 0}</div>
                        <div class="stat-label">Average Importance</div>
                    </div>
                `;
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        async function loadApplications() {
            const status = document.getElementById('statusFilter').value;
            const category = document.getElementById('categoryFilter').value;
            
            const params = new URLSearchParams();
            if (status) params.append('status', status);
            if (category) params.append('category', category);
            params.append('limit', '100');
            
            try {
                document.getElementById('loading').style.display = 'block';
                document.getElementById('error').style.display = 'none';
                document.getElementById('applicationsTable').style.display = 'none';
                
                const response = await fetch(`/api/grants/applications?${params}`);
                const data = await response.json();
                
                if (!response.ok) throw new Error(data.error || 'Failed to load applications');
                
                applications = data.applications || [];
                displayApplications(applications);
                
            } catch (error) {
                document.getElementById('error').textContent = 'Error: ' + error.message;
                document.getElementById('error').style.display = 'block';
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        function displayApplications(apps) {
            const tbody = document.getElementById('applicationsBody');
            
            if (apps.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align: center; padding: 40px;">No applications found</td></tr>';
                document.getElementById('applicationsTable').style.display = 'table';
                return;
            }
            
            tbody.innerHTML = apps.map(app => `
                <tr>
                    <td>${new Date(app.submitted_at).toLocaleDateString()}</td>
                    <td><strong>${app.project_title || 'Untitled'}</strong></td>
                    <td>${formatCategory(app.project_category)}</td>
                    <td>${app.email}</td>
                    <td>${app.confidence ? app.confidence + '/10' : 'N/A'}</td>
                    <td>${app.grant_importance ? app.grant_importance + '/5' : 'N/A'}</td>
                    <td><span class="status ${app.status}">${app.status}</span></td>
                    <td>
                        <button class="view-btn" onclick="viewApplication('${app.id}')">View</button>
                    </td>
                </tr>
            `).join('');
            
            document.getElementById('applicationsTable').style.display = 'table';
        }

        function formatCategory(category) {
            if (!category) return 'Not specified';
            return category.split('-').map(word => 
                word.charAt(0).toUpperCase() + word.slice(1)
            ).join(' ');
        }

        function viewApplication(id) {
            const app = applications.find(a => a.id === id);
            if (!app) return;
            
            document.getElementById('modalTitle').textContent = app.project_title;
            document.getElementById('modalContent').innerHTML = `
                <div class="field">
                    <div class="field-label">Application ID</div>
                    <div class="field-value">${app.id}</div>
                </div>
                <div class="field">
                    <div class="field-label">Submitted</div>
                    <div class="field-value">${new Date(app.submitted_at).toLocaleString()}</div>
                </div>
                <div class="field">
                    <div class="field-label">Email</div>
                    <div class="field-value">${app.email}</div>
                </div>
                <div class="field">
                    <div class="field-label">Wallet Address</div>
                    <div class="field-value">${app.wallet_address}</div>
                </div>
                <div class="field">
                    <div class="field-label">Project Summary</div>
                    <div class="field-value">${app.project_summary}</div>
                </div>
                <div class="field">
                    <div class="field-label">Category</div>
                    <div class="field-value">${formatCategory(app.project_category)}${app.other_category ? ' - ' + app.other_category : ''}</div>
                </div>
                <div class="field">
                    <div class="field-label">Project Stage</div>
                    <div class="field-value">${app.project_stage}</div>
                </div>
                <div class="field">
                    <div class="field-label">PROI Generation</div>
                    <div class="field-value">${app.proi_generation}</div>
                </div>
                <div class="field">
                    <div class="field-label">Timeline</div>
                    <div class="field-value">${app.timeline}</div>
                </div>
                <div class="field">
                    <div class="field-label">Confidence Level</div>
                    <div class="field-value">${app.confidence}/10</div>
                </div>
                <div class="field">
                    <div class="field-label">Grant Importance</div>
                    <div class="field-value">${app.grant_importance}/5</div>
                </div>
                <div class="field">
                    <div class="field-label">Status</div>
                    <div class="field-value"><span class="status ${app.status}">${app.status}</span></div>
                </div>
                ${app.review_notes ? `
                <div class="field">
                    <div class="field-label">Review Notes</div>
                    <div class="field-value">${app.review_notes}</div>
                </div>
                ` : ''}
                <div class="actions">
                    <button class="approve-btn" onclick="updateStatus('${app.id}', 'approved')">Approve</button>
                    <button class="reject-btn" onclick="updateStatus('${app.id}', 'rejected')">Reject</button>
                    <button onclick="closeModal()">Close</button>
                </div>
            `;
            
            document.getElementById('detailModal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('detailModal').style.display = 'none';
        }

        async function updateStatus(id, status) {
            const notes = prompt('Add review notes (optional):');
            
            try {
                const response = await fetch(`/api/grants/applications/${id}`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        status: status,
                        review_notes: notes || null
                    })
                });
                
                if (response.ok) {
                    alert(`Application ${status} successfully!`);
                    closeModal();
                    loadApplications();
                    loadStats();
                } else {
                    alert('Error updating application status');
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        function resetFilters() {
            document.getElementById('statusFilter').value = '';
            document.getElementById('categoryFilter').value = '';
            loadApplications();
        }

        function exportToCSV() {
            if (applications.length === 0) {
                alert('No applications to export');
                return;
            }
            
            const headers = ['ID', 'Submitted', 'Project Title', 'Email', 'Category', 'Stage', 'Confidence', 'Importance', 'Status', 'Wallet'];
            const rows = applications.map(app => [
                app.id,
                new Date(app.submitted_at).toISOString(),
                app.project_title,
                app.email,
                app.project_category,
                app.project_stage,
                app.confidence,
                app.grant_importance,
                app.status,
                app.wallet_address
            ]);
            
            const csv = [headers, ...rows]
                .map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(','))
                .join('\n');
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `grant-applications-${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('detailModal');
            if (event.target === modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
