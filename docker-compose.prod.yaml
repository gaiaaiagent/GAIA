version: '3.8'

services:
  # Nginx Reverse Proxy with Basic Auth
  nginx:
    image: ghcr.io/gaiaaiagent/gaia/nginx:regen-latest
    container_name: nginx
    ports:
      - '80:80'  # Main web access
    depends_on:
      - regen
      - django
    restart: always
    networks:
      - eliza-network

  # PostgreSQL Database with pgvector
  postgres:
    image: ankane/pgvector:latest
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_DB=eliza
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data:rw
    ports:
      - '127.0.0.1:5433:5432'  # Using 5433 to avoid conflict with local postgres
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - eliza-network

  # RegenAI Application - Using GitHub Container Registry
  regen:
    image: ghcr.io/gaiaaiagent/gaia/regen:working
    container_name: regen
    command: sh -c "cd packages/cli && bun dist/index.js start --character /app/characters/regenai.character.json --character /app/characters/advocate.character.json --character /app/characters/governor.character.json --character /app/characters/narrative.character.json --character /app/characters/voiceofnature.character.json"
    volumes:
      - ./characters:/app/characters:ro
      - ./.env:/app/.env:ro
    environment:
      # Force development mode for WebUI
      - NODE_ENV=development
      - ELIZA_UI_ENABLE=true
      # API Keys from .env
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # Server configuration
      - SERVER_PORT=3000
      - SERVER_HOST=0.0.0.0
      # Database connection to container postgres
      - POSTGRES_URL=postgresql://postgres:postgres@postgres:5432/eliza
      # Optional services (can be empty)
      - EVM_CHAINS=${EVM_CHAINS:-}
      - BIRDEYE_API_KEY=${BIRDEYE_API_KEY:-}
      - DISCORD_APPLICATION_ID=${DISCORD_APPLICATION_ID:-}
      - DISCORD_API_TOKEN=${DISCORD_API_TOKEN:-}
    ports:
      - '3000:3000'
      - '50000-50100:50000-50100/udp'
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    networks:
      - eliza-network

  # Django Admin Application - Using GitHub Container Registry
  django:
    image: ghcr.io/gaiaaiagent/gaia/django-admin:regen-latest
    container_name: django-admin
    environment:
      - DEBUG=False  # Set to False for production
      - DJANGO_ENV=production
      - SECRET_KEY=${DJANGO_SECRET_KEY:-django-insecure-change-this-in-production}
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/eliza
      - POSTGRES_DB=eliza
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1,admin.localhost,agents.localhost}
      - SESSION_COOKIE_DOMAIN=${SESSION_COOKIE_DOMAIN:-}
      - CSRF_COOKIE_DOMAIN=${CSRF_COOKIE_DOMAIN:-}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-http://localhost,http://admin.localhost,http://agents.localhost}
    volumes:
      - django-static:/app/staticfiles
      - django-media:/app/media
    ports:
      - '8000:8000'
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    networks:
      - eliza-network

networks:
  eliza-network:
    driver: bridge

volumes:
  postgres-data:
  django-static:
  django-media: