name: Deploy to Production

on:
  workflow_run:
    workflows: ["Build and Push Docker Images"]
    types: [completed]
    branches: [regen]
  workflow_dispatch:  # Allow manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only run if docker build succeeded or manual trigger
    if: |
      github.event_name == 'workflow_dispatch' || 
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Production Server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST || '202.61.196.119' }}
          username: ${{ secrets.DEPLOY_USER || secrets.SERVER_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY || secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            
            echo "🚀 Starting smart deployment..."
            cd /opt/projects/GAIA
            
            # Pull latest code
            echo "📦 Pulling latest code..."
            git fetch origin regen
            git reset --hard origin/regen
            
            # Make scripts executable
            chmod +x scripts/*.sh
            
            # Run smart deployment
            echo "🧠 Running smart deployment with change detection..."
            ./scripts/smart-deploy.sh || {
                echo "❌ Smart deployment failed, falling back to standard deployment"
                
                # Fallback to standard deployment
                docker pull ghcr.io/gaiaaiagent/gaia/regen:latest
                docker pull ghcr.io/gaiaaiagent/gaia/django-admin:latest
                docker pull ghcr.io/gaiaaiagent/gaia/nginx:latest
                
                docker compose down
                docker compose up -d
                
                sleep 15
                
                if ! docker ps | grep -q "regen"; then
                    echo "❌ Deployment failed!"
                    exit 1
                fi
            }
            
            echo "✅ Deployment completed!"

      - name: Verify Deployment
        if: success()
        run: |
          echo "🎉 Deployment to production completed successfully!"
          echo "📝 Deployed commit: ${{ github.sha }}"
          echo "🔗 Production URL: https://regen.gaiaai.xyz"