events {
    worker_connections 1024;
}

http {
    # Upstream servers
    upstream eliza_app {
        server eliza:3000;
    }

    upstream django_app {
        server django:8000;
    }

    # Main server block
    server {
        listen 80;
        server_name localhost;

        # Root redirects to agents
        location = / {
            return 301 /agents;
        }

        # ElizaOS WebUI at /agents
        location /agents {
            proxy_pass http://eliza_app/;  # Note trailing slash for path rewriting
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ElizaOS assets (JS, CSS, etc)
        location /assets/ {
            proxy_pass http://eliza_app/assets/;
            proxy_set_header Host $host;
        }
        
        # ElizaOS favicon
        location /favicon.ico {
            proxy_pass http://eliza_app/favicon.ico;
            proxy_set_header Host $host;
        }

        # Django Admin at /admin
        location /admin {
            proxy_pass http://django_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Django static files (if we want nginx to serve them)
        location /static/ {
            # For now, let WhiteNoise handle it
            proxy_pass http://django_app;
        }

        # ElizaOS API endpoints
        location /api/ {
            proxy_pass http://eliza_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}