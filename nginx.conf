events {
    worker_connections 1024;
}

http {
    # Upstream servers
    upstream eliza_app {
        server eliza:3000;
    }

    upstream django_app {
        server django:8000;
    }

    # ElizaOS Agents - agents.localhost
    # TODO: Add Django auth_request once Host header issues are resolved
    server {
        listen 80;
        server_name agents.localhost;

        location / {
            # FUTURE: Add auth_request /auth-check;
            # FUTURE: error_page 401 = @login_redirect;
            
            proxy_pass http://eliza_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # FUTURE: Authentication endpoints will be added here
        # The auth_request module needs proper Host header configuration
        # to work with Django's ALLOWED_HOSTS security
    }

    # Django Admin - admin.localhost
    server {
        listen 80;
        server_name admin.localhost;

        location / {
            proxy_pass http://django_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Default server - redirects to agents
    server {
        listen 80 default_server;
        server_name _;
        return 301 http://agents.localhost$request_uri;
    }
}