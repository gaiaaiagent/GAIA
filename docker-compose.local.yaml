version: '3.8'

services:
  # Nginx Reverse Proxy with Basic Auth
  nginx:
    build:
      context: .
      dockerfile: nginx.Dockerfile
    container_name: nginx
    ports:
      - '80:80' # Main web access
    depends_on:
      - regenai
      - django
    restart: always
    networks:
      - regenai-network

  # PostgreSQL Database with pgvector
  postgres:
    image: ankane/pgvector:latest
    container_name: postgres
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_DB=eliza
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data:rw
    ports:
      - '127.0.0.1:5433:5432' # Using 5433 to avoid conflict
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - regenai-network

  # RegenAI Agents Application
  regenai:
    image: gaia-regenai:latest # Use local image
    container_name: regenai
    command: sh -c "cd packages/cli && bun dist/index.js start --character /app/characters/regenai.character.json --character /app/characters/advocate.character.json --character /app/characters/governor.character.json --character /app/characters/narrative.character.json --character /app/characters/voiceofnature.character.json"
    volumes:
      - ./characters:/app/characters:ro
      - ./.env:/app/.env:ro
    environment:
      # Force development mode for WebUI
      - NODE_ENV=development
      - ELIZA_UI_ENABLE=true
      # API Keys from .env
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # Server configuration
      - SERVER_PORT=3000
      - SERVER_HOST=0.0.0.0
      # Database connection
      - POSTGRES_URL=postgresql://postgres:postgres@postgres:5432/eliza
      # Optional services
      - EVM_CHAINS=${EVM_CHAINS:-}
      - BIRDEYE_API_KEY=${BIRDEYE_API_KEY:-}
      - DISCORD_APPLICATION_ID=${DISCORD_APPLICATION_ID:-}
      - DISCORD_API_TOKEN=${DISCORD_API_TOKEN:-}
    ports:
      - '3000:3000'
      - '50000-50100:50000-50100/udp'
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    networks:
      - regenai-network

  # Django Admin Application
  django:
    build:
      context: ./django_admin
      dockerfile: Dockerfile
    container_name: django
    environment:
      - DEBUG=${DEBUG:-False}
      - DJANGO_ENV=${DJANGO_ENV:-production}
      - SECRET_KEY=${DJANGO_SECRET_KEY:-django-insecure-change-in-production}
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/eliza
      - POSTGRES_DB=eliza
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1,admin.localhost,agents.localhost}
      - SESSION_COOKIE_DOMAIN=${SESSION_COOKIE_DOMAIN:-}
      - CSRF_COOKIE_DOMAIN=${CSRF_COOKIE_DOMAIN:-}
    volumes:
      - ./django_admin:/app:ro
      - django-static:/app/staticfiles
      - django-media:/app/media
    ports:
      - '8000:8000'
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    networks:
      - regenai-network

networks:
  regenai-network:
    driver: bridge

volumes:
  postgres-data:
  django-static:
  django-media:
