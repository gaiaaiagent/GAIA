events {
    worker_connections 1024;
}

http {
    # Rate limiting
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Upstream servers
    upstream regen_app {
        server regen:3000;
    }

    upstream django_app {
        server django:8000;
    }

    # HTTP to HTTPS redirect for all domains
    server {
        listen 80;
        server_name regen.gaiaai.xyz admin.regen.gaiaai.xyz;
        
        # Allow Let's Encrypt challenges
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        
        # Redirect all other traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS - RegenAI Agents (regen.gaiaai.xyz)
    server {
        listen 443 ssl http2;
        server_name regen.gaiaai.xyz;

        # SSL certificates from Let's Encrypt
        ssl_certificate /etc/letsencrypt/live/regen.gaiaai.xyz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/regen.gaiaai.xyz/privkey.pem;
        
        # SSL configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_stapling on;
        ssl_stapling_verify on;
        
        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        
        # Rate limiting
        limit_req zone=api burst=20 nodelay;
        
        # Logging
        access_log /var/log/nginx/regen.access.log;
        error_log /var/log/nginx/regen.error.log;

        location / {
            # Basic Authentication for team access
            auth_basic "RegenAI Agents - Team Access Only";
            auth_basic_user_file /etc/nginx/auth/.htpasswd;
            
            # Proxy to RegenAI agents
            proxy_pass http://regen_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            
            # Timeouts for long-running connections
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # WebSocket support
            proxy_buffering off;
        }
        
        # Health check endpoint (no auth)
        location /health {
            auth_basic off;
            proxy_pass http://regen_app/health;
            access_log off;
        }
    }

    # HTTPS - Django Admin (admin.regen.gaiaai.xyz)
    server {
        listen 443 ssl http2;
        server_name admin.regen.gaiaai.xyz;

        # SSL certificates from Let's Encrypt
        ssl_certificate /etc/letsencrypt/live/admin.regen.gaiaai.xyz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/admin.regen.gaiaai.xyz/privkey.pem;
        
        # SSL configuration (same as above)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_stapling on;
        ssl_stapling_verify on;
        
        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        
        # Rate limiting
        limit_req zone=general burst=5 nodelay;
        
        # Logging
        access_log /var/log/nginx/admin.access.log;
        error_log /var/log/nginx/admin.error.log;
        
        # Client upload size for Django admin
        client_max_body_size 10M;

        location / {
            proxy_pass http://django_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            
            # CSRF protection
            proxy_set_header X-CSRFToken $http_x_csrftoken;
        }
        
        # Static files for Django
        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
        
        location /media/ {
            alias /app/media/;
            expires 7d;
        }
    }
    
    # Default HTTPS server - return 444 (connection closed)
    server {
        listen 443 ssl default_server;
        server_name _;
        ssl_certificate /etc/letsencrypt/live/regen.gaiaai.xyz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/regen.gaiaai.xyz/privkey.pem;
        return 444;
    }
}