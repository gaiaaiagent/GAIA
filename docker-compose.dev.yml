version: '3.8'

# KICKASS LOCAL DEVELOPMENT ENVIRONMENT
# Fast, reliable, consistent development with Docker
# Usage: docker-compose -f docker-compose.dev.yml up

services:
  # PostgreSQL with pgvector - FAST local DB
  postgres:
    image: ankane/pgvector:latest
    container_name: gaia-postgres-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eliza
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"  # Exposed for direct access
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gaia-dev

  # All 5 agents in one container - matches production architecture
  agents:
    build:
      context: .
      dockerfile: Dockerfile
      target: development  # We'll add dev stage to Dockerfile
    container_name: gaia-agents-dev
    command: |
      sh -c "
      echo '🚀 Starting all RegenAI agents in development mode...'
      cd packages/cli
      bun dist/index.js start \
        --character /app/characters/regenai.character.json \
        --character /app/characters/advocate.character.json \
        --character /app/characters/voiceofnature.character.json \
        --character /app/characters/governor.character.json \
        --character /app/characters/narrative.character.json
      "
    volumes:
      # Mount source code for hot reload potential
      - ./packages:/app/packages:ro
      - ./characters:/app/characters:ro
      - ./knowledge:/app/knowledge:ro
      - ./.env:/app/.env:ro
      # Mount logs for easy access
      - ./logs:/app/logs
    environment:
      # Development settings
      NODE_ENV: development
      LOG_LEVEL: debug
      
      # Database
      POSTGRES_URL: postgresql://postgres:postgres@postgres:5432/eliza
      
      # Performance settings
      BUN_JSC_FORCE_JIT: 1
      NODE_OPTIONS: "--max-old-space-size=4096"
      
      # Knowledge loading
      LOAD_DOCS_ON_STARTUP: ${LOAD_DOCS_ON_STARTUP:-false}
      KNOWLEDGE_PATH: /app/knowledge
      
      # Server
      SERVER_PORT: 3000
      SERVER_HOST: 0.0.0.0
      
      # API Keys (from .env)
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      
      # Model configuration for speed
      TEXT_MODEL: ${TEXT_MODEL:-claude-3-5-haiku-20241022}
      TEXT_EMBEDDING_MODEL: ${TEXT_EMBEDDING_MODEL:-text-embedding-3-small}
    ports:
      - "3000:3000"  # Main web UI
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - gaia-dev

  # Django Admin Panel
  django:
    build:
      context: ./django_admin
      dockerfile: Dockerfile
    container_name: gaia-django-dev
    command: |
      sh -c "
      python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      python manage.py runserver 0.0.0.0:8000
      "
    volumes:
      - ./django_admin:/app
      - django-static:/app/staticfiles
    environment:
      DEBUG: "True"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/eliza
      SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-key-change-in-production}
    ports:
      - "8000:8000"  # Django admin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gaia-dev

  # Optional: Performance monitoring with Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: gaia-grafana-dev
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: redis-datasource
    ports:
      - "3001:3000"  # Grafana UI
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - gaia-dev
    profiles:
      - monitoring  # Only starts with --profile monitoring

  # Optional: Redis for caching and rate limiting
  redis:
    image: redis:alpine
    container_name: gaia-redis-dev
    ports:
      - "6379:6379"
    networks:
      - gaia-dev
    profiles:
      - cache  # Only starts with --profile cache

networks:
  gaia-dev:
    driver: bridge

volumes:
  postgres-dev-data:
  django-static:
  grafana-data:

# Usage Examples:
# 
# Basic development:
#   docker-compose -f docker-compose.dev.yml up
#
# With monitoring:
#   docker-compose -f docker-compose.dev.yml --profile monitoring up
#
# With caching:
#   docker-compose -f docker-compose.dev.yml --profile cache up
#
# Rebuild after code changes:
#   docker-compose -f docker-compose.dev.yml build --no-cache agents
#
# View logs:
#   docker-compose -f docker-compose.dev.yml logs -f agents
#
# Execute commands in container:
#   docker-compose -f docker-compose.dev.yml exec agents bash
#
# Performance test:
#   docker-compose -f docker-compose.dev.yml exec agents \
#     bun run scripts/performance-test.js