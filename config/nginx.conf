events {
    worker_connections 1024;
}

http {
    # Upstream servers
    upstream regen_app {
        server 172.17.0.1:3000;
    }

    upstream django_app {
        server django-admin:8000;
    }

    # Main RegenAI Dashboard with Basic Auth
    server {
        listen 80;
        server_name regen.gaiaai.xyz www.regen.gaiaai.xyz;

        location / {
            # Basic Authentication
            auth_basic "RegenAI Dashboard - Team Access Only";
            auth_basic_user_file /etc/nginx/auth/.htpasswd;
            
            # Proxy to RegenAI agents
            proxy_pass http://regen_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Django Admin 
    server {
        listen 80;
        server_name admin.regen.gaiaai.xyz;

        location / {
            proxy_pass http://django_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Default server
    server {
        listen 80 default_server;
        server_name _;
        return 301 http://regen.gaiaai.xyz/;
    }
}