events {
    worker_connections 1024;
}

http {
    # MIME types
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Upstream servers
    upstream regen_app {
        server 172.17.0.1:3000;
    }

    upstream django_app {
        server django-admin:8000;
    }

    # HTTP to HTTPS redirect for all domains
    server {
        listen 80;
        server_name _;
        
        # Allow Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        
        # Redirect all other HTTP traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Special HTTP redirect for agents subdomain
    server {
        listen 80;
        server_name agents.regen.gaiaai.xyz;
        
        # Redirect to main domain
        return 301 https://regen.gaiaai.xyz$request_uri;
    }

    # HTTPS redirect for agents subdomain (will show cert warning but redirects)
    server {
        listen 443 ssl http2;
        server_name agents.regen.gaiaai.xyz;

        # SSL certificates (mismatched but allows connection)
        ssl_certificate /etc/letsencrypt/live/regen.gaiaai.xyz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/regen.gaiaai.xyz/privkey.pem;
        
        # Minimal SSL config
        ssl_protocols TLSv1.2 TLSv1.3;
        
        # Immediate redirect to main domain
        return 301 https://regen.gaiaai.xyz$request_uri;
    }

    # HTTPS configuration for admin and dashboard subdomains
    server {
        listen 443 ssl http2;
        server_name admin.regen.gaiaai.xyz dashboard.regen.gaiaai.xyz;

        # SSL certificates
        ssl_certificate /etc/letsencrypt/live/regen.gaiaai.xyz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/regen.gaiaai.xyz/privkey.pem;
        
        # SSL configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_stapling on;
        ssl_stapling_verify on;

        # Django static files
        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location /media/ {
            alias /app/media/;
            expires 30d;
        }

        location / {
            proxy_pass http://django_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Ssl on;
            
            # Django CSRF protection
            proxy_set_header X-CSRFToken $http_x_csrftoken;
        }
    }

    # HTTPS configuration for main domain
# =========================================================================
    # Registry.regen.gaiaai.xyz - KOI API endpoints for ChatGPT Custom GPT
    server {
        listen 443 ssl http2;
        server_name registry.regen.gaiaai.xyz;

        # SSL Configuration - use dedicated certificate
        ssl_certificate /etc/letsencrypt/live/registry.regen.gaiaai.xyz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/registry.regen.gaiaai.xyz/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # KOI Entity API (port 8301) - exact match to avoid redirect
        location = /api/koi/entity {
            auth_basic off;
            proxy_pass http://172.17.0.1:8301/api/koi/entity;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60;

            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization';
                add_header 'Access-Control-Max-Age' 86400;
                add_header 'Content-Type' 'text/plain charset=UTF-8';
                add_header 'Content-Length' 0;
                return 204;
            }
        }

        # KOI Entity sub-endpoints (port 8301)
        location ^~ /api/koi/entity/ {
            auth_basic off;
            proxy_pass http://172.17.0.1:8301;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;
        }

        # KOI Query API (port 8301)
        location ^~ /api/koi/query {
            auth_basic off;
            proxy_pass http://172.17.0.1:8301/api/koi/query;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;
        }

        # KOI Chat API (port 8301) - RAG chat for bizdev dashboards
        location ^~ /api/koi/chat {
            auth_basic off;
            proxy_pass http://172.17.0.1:8301/api/koi/chat;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30;

            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;
        }

        # KOI Weekly Digest (port 8400)
        location ^~ /api/koi/weekly-digest {
            auth_basic off;
            proxy_pass http://172.17.0.1:8400/api/koi/weekly-digest;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120;

            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;
        }

        # KOI Graph API (port 8301)
        location ^~ /api/koi/graph {
            auth_basic off;
            proxy_pass http://172.17.0.1:8301;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;
        }

        # Default for other /api/koi/* paths - return JSON 404
        location /api/koi {
            return 404 '{error: Not found, hint: Available endpoints: /api/koi/entity, /api/koi/query, /api/koi/weekly-digest, /api/koi/graph}';
            default_type application/json;
        }

        # Non-API paths - redirect to main domain
        location / {
            return 301 https://regen.gaiaai.xyz$request_uri;
        }
    }

    server {
        listen 443 ssl http2;
        server_name regen.gaiaai.xyz www.regen.gaiaai.xyz;

        # SSL certificates
        ssl_certificate /etc/letsencrypt/live/regen.gaiaai.xyz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/regen.gaiaai.xyz/privkey.pem;
        
        # SSL configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_stapling on;
        ssl_stapling_verify on;

        # Redirect /digests to /digests/
        location = /digests {
            return 301 /digests/;
        }

        # Redirect /activate to KOI activation page
        location = /activate {
            return 301 /api/koi/activate;
        }

        # Digests Dashboard - proxy to Flask app on port 8400
        location /digests/ {
            proxy_pass http://172.17.0.1:8400/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # Increase timeout for long-running operations
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;

            # Increase buffer sizes for large responses
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
        }

        # Digests API endpoints
        location /digests/api {
            proxy_pass http://172.17.0.1:8400/api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Increase timeout for long-running operations like daily/weekly generation
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # Digests static files
        location /digests/static {
            proxy_pass http://172.17.0.1:8400/static;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Digests WebSocket endpoint
        location /digests/socket.io {
            proxy_pass http://172.17.0.1:8400/socket.io;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Podcast 3D Visualization Map
        location /podcast {
            proxy_pass http://172.17.0.1:8400/podcast;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Increase buffer sizes for large JSON responses
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
        }

        # Podcast static files (JS, JSON)
        location /static/podcast {
            proxy_pass http://172.17.0.1:8400/static/podcast;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            expires 1h;
            add_header Cache-Control "public";
        }

        # Main API proxy (ElizaOS server endpoints)
        location /api/ {
            auth_basic off;
            proxy_pass http://172.17.0.1:3000/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # SSE endpoint for real-time updates
        location /sse {
            auth_basic off;
            proxy_pass http://172.17.0.1:3000/sse;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header Cache-Control 'no-cache';
            proxy_set_header X-Accel-Buffering 'no';
            proxy_read_timeout 86400;
        }

        # KOI Pipeline Service Proxies
        location /api/koi/coordinator/ {
            proxy_pass http://172.17.0.1:8005/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/koi/event-bridge/ {
            proxy_pass http://172.17.0.1:8100/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/koi/bge/ {
            proxy_pass http://172.17.0.1:8090/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/koi/mcp/ {
            proxy_pass http://172.17.0.1:8200/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # GitHub Webhook for Code Graph updates (port 8360)
        location ^~ /webhook/ {
            auth_basic off;
            proxy_pass http://172.17.0.1:8360/webhook/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Hub-Signature-256 $http_x_hub_signature_256;
            proxy_set_header X-GitHub-Event $http_x_github_event;
            proxy_set_header X-GitHub-Delivery $http_x_github_delivery;
            proxy_read_timeout 120;
            proxy_connect_timeout 60;
        }

        # KOI Hybrid Search Query API (port 8301)
        location ^~ /api/koi/query {
            # Disable basic auth for API access
            auth_basic off;

            proxy_pass http://172.17.0.1:8301/api/koi/query;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Add CORS headers for browser access
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;
        }

        # KOI Chat API (port 8301) - RAG chat for bizdev dashboards
        location ^~ /api/koi/chat {
            auth_basic off;
            proxy_pass http://172.17.0.1:8301/api/koi/chat;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30;

            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;
        }

        # KOI Metadata API - Anchored metadata resolution (port 8301)
        # KOI Feedback API - User feedback collection (port 8301)
        location ^~ /api/koi/feedback {
            # Disable basic auth for API access
            auth_basic off;

            proxy_pass http://172.17.0.1:8301/api/koi/feedback;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30;

            # Add CORS headers for browser access
            add_header "Access-Control-Allow-Origin" "*" always;
            add_header "Access-Control-Allow-Methods" "GET, POST, OPTIONS" always;
            add_header "Access-Control-Allow-Headers" "Origin, Content-Type, Accept, Authorization" always;
        }

        location ^~ /api/koi/metadata {
            # Disable basic auth for API access
            auth_basic off;

            proxy_pass http://172.17.0.1:8301/api/koi/metadata;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30;
        }

        # KOI Document Full Retrieval API - Full document content by RID (port 8301)
        location ^~ /api/koi/document {
            # Disable basic auth for API access
            auth_basic off;

            proxy_pass http://172.17.0.1:8301/api/koi/document;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60;
        }

        

        # KOI Entity API - Consolidated POST endpoint (port 8301)
        # IMPORTANT: Must have exact match for /api/koi/entity to avoid 301 redirect breaking POST
        location = /api/koi/entity {
            # Disable basic auth for API access
            auth_basic off;

            proxy_pass http://172.17.0.1:8301/api/koi/entity;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Add CORS headers for browser access
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;

            # Handle CORS preflight
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization';
                add_header 'Access-Control-Max-Age' 86400;
                add_header 'Content-Type' 'text/plain charset=UTF-8';
                add_header 'Content-Length' 0;
                return 204;
            }
        }

        # KOI Entity Resolution sub-endpoints (resolve, neighborhood, documents) - port 8301
        location ^~ /api/koi/entity/ {
            # Disable basic auth for API access
            auth_basic off;

            proxy_pass http://172.17.0.1:8301;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Add CORS headers for browser access
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;
        }

        # KOI Stats endpoint - proxy to hybrid-rag-api
        location = /api/koi/stats {
            # Disable basic auth for API access
            auth_basic off;

            proxy_pass http://172.17.0.1:8301;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Add CORS headers for browser access
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;
        }
# KOI Weekly Digest API (port 8400)
        location ^~ /api/koi/weekly-digest {
            # Disable basic auth for API access
            auth_basic off;

            proxy_pass http://172.17.0.1:8400/api/koi/weekly-digest;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Add CORS headers for browser access
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;
        }

        # Registry Review API (port 8003)
        # Registry Review Frontend (React SPA)
        location = /registry-review {
            auth_basic off;
            
            # Handle both /registry-review and /registry-review/
            rewrite ^/registry-review$ /registry-review/ permanent;
        }

        location ^~ /registry-review/ {
            auth_basic off;
            
            alias /opt/projects/registry-review/web_app/dist/;
            index index.html;
            
            # SPA fallback - serve index.html for all routes
            try_files $uri $uri/ /registry-review/index.html;
        }

        location ^~ /api/registry/ {
            # Disable basic auth for API access
            auth_basic off;

            # Support file uploads up to 100MB
            client_max_body_size 100M;

            proxy_pass http://172.17.0.1:8020/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeout settings for LLM operations (10 minutes)
            proxy_connect_timeout 60s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;

            # Buffer settings for large responses
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;

            # Add CORS headers for browser access
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;
        }

        # Apache AGE Graph Query API (port 8301)
        location ^~ /api/koi/graph {
            # Disable basic auth for API access
            auth_basic off;

            proxy_pass http://172.17.0.1:8301;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Add CORS headers for browser access
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;
        }

        # Django KOI Graph Visualization API (NEW - higher priority)
        # Must come BEFORE /api/koi/graph/ to match first
        location ^~ /api/koi/graph-data/ {
            proxy_pass http://172.17.0.1:8000/api/koi/graph-data/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Real-Forward $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Add CORS headers
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;
        }

        # Django KOI Health Check
        location ^~ /api/koi/health/ {
            proxy_pass http://172.17.0.1:8000/api/koi/health/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Django KOI SPARQL Execution
        location ^~ /api/koi/sparql/ {
            proxy_pass http://172.17.0.1:8000/api/koi/sparql/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Django KOI Natural Language Query
        location ^~ /api/koi/nl-query/ {
            proxy_pass http://172.17.0.1:8000/api/koi/nl-query/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Django KOI Essence Data
        location ^~ /api/koi/essence-data/ {
            proxy_pass http://172.17.0.1:8000/api/koi/essence-data/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # KOI Provenance/Trace API - Pipeline Metadata (port 8002)
        # Must come BEFORE generic /api/koi/graph/ to match first
        location ^~ /api/koi/graph/provenance/ {
            proxy_pass http://172.17.0.1:8002/api/koi/graph/provenance/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Add CORS headers for browser access
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;
        }

        # KOI Knowledge Graph API (Fuseki-based extracted entities - OLD/LEGACY)
        # Routes to KOI API Server on port 8001 which connects to Fuseki
        # This is now a fallback for /api/koi/graph/* paths not matched above
        location ^~ /api/koi/graph/ {
            proxy_pass http://172.17.0.1:8001/api/koi/graph/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Add CORS headers for browser access
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;
        }

        # KOI Content API (database queries via ElizaOS server)
        # KOI OAuth Authentication
        # KOI User Profile API (personalization for teaching mode)
        location /api/koi/user/ {
            proxy_pass http://172.17.0.1:8301/api/koi/user/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60;
        }

        location /api/koi/auth/ {
            proxy_pass http://172.17.0.1:8007/api/koi/auth/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }


        # KOI Device Activation Page (OAuth device flow)
        location /api/koi/activate {
            proxy_pass http://172.17.0.1:8007/api/koi/activate;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/koi/content/ {
            proxy_pass http://172.17.0.1:8007/api/koi/content/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # KOI Transformations API
        location /api/koi/transformations {
            proxy_pass http://172.17.0.1:8002/api/koi/transformations;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # KOI RIDs API
        # Claude Config HTTP endpoint
        location /api/koi/claude-config {
            proxy_pass http://172.17.0.1:8002/api/koi/claude-config;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/koi/rids {
            proxy_pass http://172.17.0.1:8002/api/koi/rids;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /api/koi/rid-lookup {
            proxy_pass http://172.17.0.1:8301/api/koi/rid-lookup;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Apache Jena Fuseki SPARQL endpoint (port 3030)
        # Used by external MCP clients for hybrid search (vector + graph)
        location /api/koi/fuseki {
            # Disable basic auth for API access
            auth_basic off;

            # Rewrite to remove /api/koi prefix
            rewrite ^/api/koi/fuseki/(.*) /$1 break;

            proxy_pass http://172.17.0.1:3030;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SPARQL-specific headers
            proxy_set_header Accept "application/sparql-results+json, application/json";

            # Increase timeouts for long queries
            proxy_read_timeout 300;
            proxy_connect_timeout 300;
            proxy_send_timeout 300;
        }

        # Direct access to KOI dataset SPARQL endpoint
        location /api/koi/fuseki/koi/sparql {
            # Disable basic auth for API access
            auth_basic off;

            proxy_pass http://172.17.0.1:3030/koi/sparql;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SPARQL-specific settings
            proxy_set_header Accept "application/sparql-results+json, application/json";
            proxy_read_timeout 300;
            proxy_connect_timeout 300;
            proxy_send_timeout 300;
        }

        # Regen Knowledge Graph Visualization (static GraphRAG viewer)
        location = /graph {
            return 301 /graph/;
        }

        location /graph/ {
            alias /opt/projects/GAIA/graph/;
            index index.html;
            try_files $uri $uri/ =404;
        }

        # IRL Grant Application (static files)
        location /irl/ {
            alias /opt/projects/GAIA/Gaia-IRL/;
            try_files $uri $uri/ /index.html;
        }

        # Grant API endpoints
        location /api/grants/ {
            proxy_pass http://172.17.0.1:3007/api/grants/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Regen Network API - ChatGPT Actions endpoint (port 8008)
        location /regen-api/ {
            # Disable basic auth for API access
            auth_basic off;

            proxy_pass http://172.17.0.1:8008/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120;
            proxy_connect_timeout 60;

            # Add CORS headers for ChatGPT
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;
        }


        # BizDev Dashboard - Static SPA with demo auth
        location /bizdev/ {
            alias /opt/projects/regen-bizdev-web/;
            try_files $uri $uri/ /bizdev/index.html;
            auth_basic "Regen Network - Registry Readiness";
            auth_basic_user_file /etc/nginx/auth/.htpasswd-bizdev;
        }

        # Scribe Transcription App - Frontend
        location /scribe {
            auth_basic off;
            proxy_pass http://172.17.0.1:3002/scribe;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Scribe Transcription App - Next.js static files
        location /scribe/_next {
            auth_basic off;
            proxy_pass http://172.17.0.1:3002/scribe/_next;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Scribe Transcription API - Proxy to transcription server
        location /scribe/api {
            auth_basic off;
            proxy_pass http://172.17.0.1:3002/scribe/api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300;
            proxy_connect_timeout 300;
            proxy_send_timeout 300;
            client_max_body_size 500M;
        }
        location / {
            # Basic Authentication
            auth_basic "RegenAI Dashboard - Team Access Only";
            auth_basic_user_file /etc/nginx/auth/.htpasswd;
            
            # Proxy to RegenAI agents
            proxy_pass http://regen_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Ssl on;
            
            # Timeouts for long-running connections
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}
