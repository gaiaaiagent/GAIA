events {
    worker_connections 1024;
}

http {
    # MIME types
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Upstream for Django admin
    upstream django_app {
        server 172.18.0.1:8000;
    }

    # HTTP to HTTPS redirect for all domains
    server {
        listen 80;
        server_name _;
        
        # Allow Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        
        # Redirect all other HTTP traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS configuration for admin subdomain
    server {
        listen 443 ssl http2;
        server_name admin.regen.gaiaai.xyz;

        # SSL certificates
        ssl_certificate /etc/letsencrypt/live/regen.gaiaai.xyz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/regen.gaiaai.xyz/privkey.pem;
        
        # SSL configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_stapling on;
        ssl_stapling_verify on;

        # Django admin proxy
        location / {
            proxy_pass http://django_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Ssl on;
            
            # Django CSRF protection
            proxy_set_header X-CSRFToken $http_x_csrftoken;
        }
    }

    # HTTPS configuration for main domain
    server {
        listen 443 ssl http2;
        server_name regen.gaiaai.xyz www.regen.gaiaai.xyz;

        # SSL certificates
        ssl_certificate /etc/letsencrypt/live/regen.gaiaai.xyz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/regen.gaiaai.xyz/privkey.pem;
        
        # SSL configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_stapling on;
        ssl_stapling_verify on;

        # Specific route for IRL page
        location /irl {
            root /usr/share/nginx/html;
            try_files /irl.html =404;
        }

        # Landing page
        location /landing {
            root /usr/share/nginx/html;
            try_files /landing.html =404;
        }

        # KOI dashboard proxy
        location /koi/ {
            proxy_pass http://172.18.0.1:8100/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Main site - proxy to Eliza agents
        location / {
            proxy_pass http://172.18.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_cache_bypass $http_upgrade;
        }
    }
}